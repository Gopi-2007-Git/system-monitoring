<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ClassGuardian AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }

        body{

            background:#0f172a;
            color:white;
            min-height:100vh;

        }

        header{

            width:100%;
            padding:20px 40px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            background:#111827;

            border-bottom:1px solid #334155;

        }

        .title{

            font-size:28px;
            font-weight:bold;

        }

        .clock{

            font-size:18px;

        }

        .stats{

            width:95%;
            margin:auto;

            margin-top:25px;

            display:grid;

            grid-template-columns:repeat(4,1fr);

            gap:20px;

        }

        .card{

            background:#1e293b;

            padding:20px;

            border-radius:15px;

            text-align:center;

            border:1px solid #334155;

        }

        .card h2{

            margin-top:10px;

            font-size:35px;

        }

        .student-section{

            width:95%;

            margin:auto;

            margin-top:35px;

        }

        .student-section h2{

            margin-bottom:20px;

        }

        #studentGrid{

            display:grid;

            grid-template-columns:repeat(auto-fill,minmax(340px,1fr));

            gap:25px;

        }

        .student-card{

            background:#1e293b;

            border-radius:18px;

            overflow:hidden;

            border:1px solid #334155;

        }

        .student-header{

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:15px;

            background:#111827;

        }

        .student-name{

            font-size:20px;

            font-weight:bold;

        }

        .live{

            color:#22c55e;

            font-weight:bold;

        }

        .student-screen{

            width:100%;

            height:220px;

            background:black;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .student-screen img{

            width:100%;

            height:100%;

            object-fit:cover;

        }

        .student-footer{

            padding:15px;

        }

        .status{

            display:flex;

            justify-content:space-between;

            margin-top:10px;

        }

        .status span{

            color:#cbd5e1;

        }
        .fullscreen-modal{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.95);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.fullscreen-modal img{

    max-width:95%;

    max-height:95%;

    border-radius:15px;

}

#closeFullscreen{

    position:absolute;

    top:20px;

    right:35px;

    color:white;

    font-size:45px;

    cursor:pointer;

    font-weight:bold;

}

        footer{

            text-align:center;

            padding:20px;

            margin-top:40px;

            color:#94a3b8;

        }
        .activity-feed{

    margin-top:20px;

    background:#1e293b;

    border-radius:15px;

    border:1px solid #334155;

    height:220px;

    overflow-y:auto;

    padding:15px;

}

.activity{

    padding:12px;

    margin-bottom:10px;

    border-left:4px solid #22c55e;

    background:#111827;

    border-radius:8px;

    animation:fadeIn .3s;

}

.activity-time{

    color:#94a3b8;

    font-size:13px;

    margin-bottom:5px;

}
.alert-card{

    border:3px solid red;

    box-shadow:0 0 20px red;

    animation:pulse 1s infinite;

}

@keyframes pulse{

    0%{

        transform:scale(1);

    }

    50%{

        transform:scale(1.02);

    }

    100%{

        transform:scale(1);

    }

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

    </style>

</head>

<body>

<header>

    <div class="title">

        🛡 ClassGuardian AI

    </div>

    <div class="clock"
         id="clock">

    </div>

</header>

<div class="stats">

    <div class="card">

        <p>Total Students</p>

        <h2 id="totalStudents">0</h2>

    </div>

    <div class="card">

        <p>Online</p>

        <h2 id="onlineStudents">0</h2>

    </div>

    <div class="card">

        <p>AI Alerts</p>

        <h2 id="alerts">0</h2>

    </div>

    <div class="card">

        <p>FPS</p>

        <h2>5</h2>

    </div>

</div>

<div class="student-section">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

        <h2>Live Students</h2>

        <input
            type="text"
            id="searchStudent"
            placeholder="🔍 Search Student..."
            style="
                padding:10px 15px;
                width:260px;
                border:none;
                outline:none;
                border-radius:10px;
                background:#334155;
                color:white;
                font-size:15px;
            ">

    </div>

    <div id="studentGrid"></div>

</div>
<div id="fullscreenModal" class="fullscreen-modal">

    <span id="closeFullscreen">&times;</span>

    <img id="fullscreenImage">

</div>
<div style="width:95%;margin:40px auto;">

    <h2>📜 Live Activity Feed</h2>

    <div id="activityFeed" class="activity-feed">

    </div>

</div>

<footer>

    ClassGuardian AI • Hackathon Prototype

</footer>

<footer>

    ClassGuardian AI • Hackathon Prototype

</footer>


<script>

function updateClock(){

    const now=new Date();

    document.getElementById("clock").innerHTML=
    now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

const connectedStudents=new Set();

async function loadStudents(){


    const response=await fetch("/students");

    const students=await response.json();

    document.getElementById("totalStudents").innerHTML=students.length;

    document.getElementById("onlineStudents").innerHTML=students.length;

    const grid=document.getElementById("studentGrid");

    grid.innerHTML="";
    

    students.forEach(student=>{
        if(!connectedStudents.has(student.id)){

    connectedStudents.add(student.id);

    console.log("Activity Added :", student.id);

    addActivity(`🟢 ${student.id} Connected`);

}

        const card=`

            <div class="student-card
${student.ai_status==="🟢 Safe" ? "" : "alert-card"}"
data-name="${student.id}">
            <div class="student-header">

                <div class="student-name">

                    ${student.id}

                </div>

                <div class="live">

                    ● LIVE

                </div>

            </div>

            <div class="student-screen">

                <img
class="student-stream"
id="${student.id}"
src="/frame/${student.id}?t=${Date.now()}">

            </div>

            <div class="student-footer">

                <div class="status">

                    <span>Status</span>

                    <span>${student.status}</span>

                </div>

                <div class="status">

                    <span>AI</span>

                    <span>${student.ai_status}</span>

                </div>

            </div>

        </div>

        `;

        grid.innerHTML+=card;

    });

}

setInterval(loadStudents,1000);

loadStudents();



setInterval(()=>{

    document.querySelectorAll("img").forEach(img=>{

        img.src=img.src.split("?")[0]+"?t="+Date.now();

    });

},300);
const modal = document.getElementById("fullscreenModal");

const fullscreenImage = document.getElementById("fullscreenImage");

document.addEventListener("click",(e)=>{

    if(e.target.tagName==="IMG" && e.target.id.startsWith("Student")){

        fullscreenImage.src=e.target.src;

        modal.style.display="flex";

    }

});

document.getElementById("closeFullscreen").onclick=()=>{

    modal.style.display="none";

};

modal.onclick=(e)=>{

    if(e.target===modal){

        modal.style.display="none";

    }

};
document.getElementById("searchStudent").addEventListener("keyup", function () {

    const value = this.value.toLowerCase();

    document.querySelectorAll(".student-card").forEach(card => {

        const name = card.dataset.name.toLowerCase();

        if (name.includes(value)) {

            card.style.display = "";

        } else {

            card.style.display = "none";

        }

    });

});
function addActivity(message){

    const feed=document.getElementById("activityFeed");

    const time=new Date().toLocaleTimeString();

    const activity=document.createElement("div");

    activity.className="activity";

    activity.innerHTML=`

        <div class="activity-time">${time}</div>

        <div>${message}</div>

    `;

    feed.prepend(activity);

    while(feed.children.length>20){

        feed.removeChild(feed.lastChild);

    }

}
</script>

</body>

</html>
